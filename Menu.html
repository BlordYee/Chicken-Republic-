<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Same head as index.html -->
    <title>Chicken Republic Menu - Fried Chicken, Rice, Sharwama Nigeria</title>
</head>
<body>
    <!-- Same header -->

    <!-- STICKY CATEGORY NAV -->
    <nav class="menu-nav sticky">
        <div class="container">
            <a href="#chicken" class="menu-cat active">Chicken</a>
            <a href="#rice" class="menu-cat">Rice Meals</a>
            <a href="#sides" class="menu-cat">Sides</a>
            <a href="#drinks" class="menu-cat">Drinks</a>
        </div>
    </nav>

    <!-- MENU CATEGORIES -->
    <section id="chicken" class="menu-category">
        <div class="container">
            <div class="category-header">
                <h1>Fried Chicken</h1>
                <p>Freshly fried. Extra crispy. Naija spice.</p>
            </div>
            <div class="products-grid">
                <!-- 12+ chicken items with customization -->
                <div class="product-card customizable">
                    <img src="assets/images/chicken-6pc.webp" alt="6pc Spicy Chicken">
                    <div class="product-info">
                        <h3>6pc Spicy Fried Chicken</h3>
                        <div class="customize-options">
                            <select>
                                <option>Spice Level: Medium</option>
                                <option>Hot 🔥</option>
                                <option>Extra Hot 🔥🔥</option>
                            </select>
                        </div>
                        <div class="price">₦2,500</div>
                        <button class="btn-add-cart" data-product="chicken-6pc">Add to Cart</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Upsell Section -->
    <section class="upsell">
        <h2>Customers Also Love</h2>
        <!-- Cross-sell items -->
    </section>

    <!-- Same footer -->
</body>
</html>
